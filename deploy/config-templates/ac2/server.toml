# NHP-AC cluster 2 server peers (generated by CI)
#
# cluster 2 AC connects to the cluster 2 nhp-server only. Each [[Servers]]
# entry is one logical nhp-server identity (one pubkey); [[Servers.Instances]]
# lists every concrete address. Schema shared with nhp-agent/nhp-db — see
# nhp/common/clusterconfig.

[[Servers]]
PubKeyBase64 = "${NHP_SERVER2_PUBLIC_KEY}"
ExpireTime   = 1924991999

  [[Servers.Instances]]
  Ip   = "${SERVER2_PRIVATE_IP}"
  Port = 62206
