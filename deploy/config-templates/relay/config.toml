# NHP Relay config (generated by CI)

listenIp   = "127.0.0.1"
listenPort = 8443

enableTLS   = false

cipherScheme = 0

privateKeyBase64 = "${NHP_RELAY_PRIVATE_KEY}"

keepaliveIntervalS = 20

readTimeoutMs  = 10000
writeTimeoutMs = 10000
idleTimeoutMs  = 60000
udpTimeoutMs   = 5000

logLevel = 3

# One server, one instance. Clients must address this server
# explicitly via POST /relay/<fingerprint> (see GET /servers).
# Schema aligns with the [[Servers]] block used by nhp-agent /
# nhp-ac / nhp-db — see nhp/common/clusterconfig.
[[Servers]]
Name         = "demo"
PubKeyBase64 = "${NHP_SERVER_PUBLIC_KEY}"
LoadBalance  = "weighted-random"

  [[Servers.Instances]]
  Host   = "${SERVER_PRIVATE_IP}"
  Port   = 62206
  Weight = 1
