# NHP Relay config (generated by CI)

listenIp   = "127.0.0.1"
listenPort = 8443

enableTLS   = false

cipherScheme = 0

privateKeyBase64 = "${NHP_RELAY_PRIVATE_KEY}"

keepaliveIntervalS = 20

readTimeoutMs  = 10000
writeTimeoutMs = 10000
idleTimeoutMs  = 60000
udpTimeoutMs   = 5000

logLevel = 3

# Two server clusters behind one relay. Clients address a specific server
# explicitly via POST /relay/<fingerprint> (see GET /servers). Schema
# aligns with the [[Servers]] block used by nhp-agent / nhp-ac / nhp-db —
# see nhp/common/clusterconfig.
[[Servers]]
Name         = "demo"
PubKeyBase64 = "${NHP_SERVER_PUBLIC_KEY}"
LoadBalance  = "weighted-random"

  [[Servers.Instances]]
  Host   = "${SERVER_PRIVATE_IP}"
  Port   = 62206
  Weight = 1

# Server cluster 2 — independent nhp-server identity (pure NHP, no domain).
[[Servers]]
Name         = "demo-cluster2"
PubKeyBase64 = "${NHP_SERVER2_PUBLIC_KEY}"
LoadBalance  = "weighted-random"

  [[Servers.Instances]]
  Host   = "${SERVER2_PRIVATE_IP}"
  Port   = 62206
  Weight = 1
