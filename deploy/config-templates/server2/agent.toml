# NHP-Server cluster 2 agent peers (generated by CI)

[[Agents]]
# Native nhp-agent client. Same trusted-operator key pair as cluster 1
# (nhp_agent_private_key in opennhp/demo) so existing operators can knock
# either cluster.
PubKeyBase64 = "${NHP_AGENT_PUBLIC_KEY}"
ExpireTime = 1924991999

[[Agents]]
# PUBLIC DEMO js-agent for CLUSTER 2 (browser-side). This is an INDEPENDENT
# key pair from cluster 1's js-agent: cluster 2 trusts only its own demo
# identity, so the cluster 1 demo key cannot knock this cluster (and vice
# versa). The matching private key is served per-cluster in
# https://${DOMAIN_AGENT}/config.json (clusters[].agentPrivateKey) and the
# demo page swaps to it when cluster 2 is selected. Scope is demo-only (see
# the basic plugin resource.toml for cluster 2).
PubKeyBase64 = "${NHP_JSAGENT2_PUBLIC_KEY}"
ExpireTime = 1924991999
