# nhp-agent server-peer configuration.
#
# Each [[Servers]] block declares ONE logical nhp-server identity (one
# pubkey) and lists 1..N physical instances that share that pubkey.
# Multi-instance entries enable load-balancing across an nhp-server
# cluster (e.g. multiple replicas behind a load balancer); the cookie
# handshake works across the cluster because every replica is
# configured with the same CookieSigningKeyBase64.
#
# Per-field reference:
#   Name           — optional human-readable label (logs only)
#   PubKeyBase64   — the cluster's nhp-server public key (base64)
#   ExpireTime     — epoch seconds; peer-key validation fails after this
#   LoadBalance    — "weighted-random" (default), "random", "round-robin"
#   StickyInstance — bool; default true. When true, a KnockTarget that
#                    picks instance X for its KNK reuses X for the
#                    follow-up RKN, so cookie verification stays put.
#                    Setting false spreads retries across the cluster's
#                    instances (only safe with stateless cookies).
#
# Per-instance fields:
#   Host           — DNS name (preferred); resolves at send time
#   Ip             — static IP (used if Host is empty)
#   Port           — UDP port (required, > 0)
#   Weight         — relative weight for weighted-random; default 1
#
# ─── Cluster form (recommended) ──────────────────────────────────────
[[Servers]]
Name = "demo-cluster"
PubKeyBase64 = "4/p0mIknwmVIMocRLQKil7xIthgEdZNncv9UagiBaK2kpcH7i4hEtZjpcHox+Bn7xdV+rBKNbKlV9ye6V1VCLA=="
ExpireTime = 1924991999
LoadBalance = "round-robin"
# StickyInstance=false makes every send re-pick from the cluster, so
# the demo visibly exercises round-robin across nhp-server-1 (.9) and
# nhp-server-2 (.14). Safe here because both replicas share the same
# CookieSigningKeyBase64 (stateless cookies cross-verify between any
# pair of replicas). For production clusters that haven't been
# verified to share cookie keys, leave the default (Sticky = true) so
# a knock's KNK and follow-up RKN both land on the same replica.
StickyInstance = false

  [[Servers.Instances]]
  Ip = "177.7.0.9"
  Port = 62206
  Weight = 1

  [[Servers.Instances]]
  Ip = "177.7.0.14"
  Port = 62206
  Weight = 1

# ─── Legacy flat form (auto-upgraded, deprecated) ────────────────────
# Kept here for reference; existing single-server agent.toml files in
# this shape are auto-promoted to a single-instance cluster on load
# with a deprecation warning. Don't mix this form with [[Instances]]
# in the same entry — the loader refuses to guess which one wins.
#
# [[Servers]]
# Hostname = ""
# Ip = "177.7.0.9"
# Port = 62206
# PubKeyBase64 = "..."
# ExpireTime = 1924991999
