# list the server peers for the AC under [[Servers]] table
#
# Each [[Servers]] entry is one logical nhp-server identity (one pubkey).
# Endpoints lists every concrete address the AC should reach for that
# identity; the AC fans NHP_AOL out to all of them so any one instance can
# route a knock back to this AC. See endpoints/ac/main/etc/server.toml for
# the full schema reference.

[[Servers]]
PubKeyBase64 = "4/p0mIknwmVIMocRLQKil7xIthgEdZNncv9UagiBaK2kpcH7i4hEtZjpcHox+Bn7xdV+rBKNbKlV9ye6V1VCLA=="
Endpoints = [
    "177.7.0.9:62206",  # nhp-server
    "177.7.0.14:62206", # nhp-server-2 (same keypair, second instance)
]
ExpireTime = 1924991999
