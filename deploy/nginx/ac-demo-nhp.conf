# Optional demo.nhp server block (stealth CA certificate)
# Serves the same content as ac.opennhp.org directly, avoiding an unnecessary
# internal HTTPS proxy hop. Only install this vhost when the stealth CA-backed
# demo.nhp certificate has been provisioned on the host.
#
# See ac.conf.template for why HTTP/2 is off and keepalive/cache are disabled:
# NHP only blocks new connections on door close, so we force each refresh onto
# a fresh TCP connection and keep the page out of the browser cache.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name demo.nhp;

    ssl_certificate     /etc/nginx/certs/demo.nhp.pem;
    ssl_certificate_key /etc/nginx/certs/demo.nhp-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    keepalive_timeout 0;

    root  /var/www/acdemo;
    index index.html;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ =404;
    }
}
