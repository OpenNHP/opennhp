# NHP Relay Service Configuration
# Bridges browser HTTPS clients to the UDP NHP Server using standard NHP protocol.
#
# ⚠️  LOCAL DOCKER-COMPOSE DEMO ONLY ⚠️
# The privateKeyBase64 and nhpServerPublicKeyBase64 values below are
# PUBLIC demo keys that paired with the other docker/*/etc/config.toml
# files. They are intentionally committed so `docker-compose up` works
# out of the box. DO NOT REUSE THEM IN ANY DEPLOYMENT THAT IS REACHABLE
# OVER A NETWORK YOU DO NOT FULLY CONTROL.
#
# For real deployments, generate fresh keys and inject them from a
# secrets store (see terraform/demo/ + scripts/generate-nhp-keys.sh for
# an AWS Secrets Manager example):
#   Curve25519: docker run --rm opennhp-relay keygen --curve
#   SM2/GMSM:   docker run --rm opennhp-relay keygen --sm2
# Then set privateKeyBase64 to the private key output and register the
# corresponding public key on nhp-server in etc/relay.toml.

# HTTP listener
listenIp   = "0.0.0.0"
listenPort = 8080

# TLS (set enableTLS = true and provide cert/key paths for HTTPS)
enableTLS   = false
tlsCertFile = ""
tlsKeyFile  = ""

# Cipher scheme: 0 = Curve25519 (default), 1 = SM2/GMSM.
# Must match the key type used in privateKeyBase64 and nhpServerPublicKeyBase64.
cipherScheme = 1

# Relay identity key — MUST be set before starting.
privateKeyBase64 = "rZA6LsYh3r2l//riMRTWin7VUT/0tlrIL6YgfrJ4css="

# NHP Server upstream (UDP) — docker-compose internal address
nhpServerHost = "177.7.0.9"
nhpServerPort = 62206

# NHP Server public key (must match cipherScheme):
#   cipherScheme=0: Curve25519 public key
#   cipherScheme=1: SM2 public key
nhpServerPublicKeyBase64 = "4/p0mIknwmVIMocRLQKil7xIthgEdZNncv9UagiBaK2kpcH7i4hEtZjpcHox+Bn7xdV+rBKNbKlV9ye6V1VCLA=="

# Keepalive interval in seconds (sends NHP_KPL to keep UDP connection alive)
keepaliveIntervalS = 20

# Timeouts in milliseconds
readTimeoutMs  = 10000
writeTimeoutMs = 10000
idleTimeoutMs  = 60000
udpTimeoutMs   = 5000

# Log level: 0=silent, 1=error, 2=info, 3=debug
logLevel = 2
