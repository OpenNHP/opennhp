<!-- Light/dark theme toggle. jtd's layout includes this in the aux-nav area. -->
<button
  type="button"
  id="opennhp-theme-toggle"
  class="theme-toggle"
  aria-label="Toggle light/dark theme"
  title="Toggle light/dark theme">
  <!-- Moon icon (shown in dark mode) -->
  <svg class="theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <!-- Sun icon (shown in light mode) -->
  <svg class="theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
  </svg>
</button>

<script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
