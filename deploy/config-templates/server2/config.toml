# NHP-Server cluster 2 base config (generated by CI)
#
# Pure NHP: no HTTP/HTTPS endpoint, no public domain. This server only
# speaks the NHP UDP protocol to its AC (cluster 2) and the shared relay.

PrivateKeyBase64 = "${NHP_SERVER2_PRIVATE_KEY}"
DefaultCipherScheme = 0
ListenIp = ""
ListenPort = 62206
# No Hostname: cluster 2 server has no domain and serves no HTTP.
LogLevel = 3
DisableAgentValidation = false

# CookieSigningKeyBase64 left empty — cluster 2 runs a single nhp-server
# instance, so a random per-process key is fine (see cluster 1 config.toml
# for the multi-replica rationale).
CookieSigningKeyBase64 = "${NHP_SERVER2_COOKIE_SIGNING_KEY}"
CookieTimeWindowSeconds = 60
