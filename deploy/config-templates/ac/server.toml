# NHP-AC server peers (generated by CI)
#
# Each [[Servers]] entry is one logical nhp-server identity (one pubkey).
# Endpoints lists every concrete address the AC should reach for that
# identity; the AC fans NHP_AOL out to all of them. The demo runs a
# single nhp-server instance — to scale this cluster horizontally,
# stand up additional nhp-server hosts sharing the same keypair and
# append their "ip:port" to Endpoints.

[[Servers]]
PubKeyBase64 = "${NHP_SERVER_PUBLIC_KEY}"
Endpoints    = ["${SERVER_PRIVATE_IP}:62206"]
ExpireTime   = 1924991999
