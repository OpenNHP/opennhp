# NHP Relay Service Configuration

# HTTP listener
listenIp   = "0.0.0.0"
listenPort = 8080

# TLS (set enableTLS = true and provide cert/key paths for production HTTPS)
enableTLS   = false
tlsCertFile = ""
tlsKeyFile  = ""

# Cipher scheme: 0 = Curve25519 (default), 1 = SM2/GMSM.
cipherScheme = 0

# Relay identity key — generate with: nhp-relayd keygen --curve (or --sm2)
privateKeyBase64 = ""

# Keepalive interval in seconds
keepaliveIntervalS = 20

# Timeouts in milliseconds
readTimeoutMs  = 10000
writeTimeoutMs = 10000
idleTimeoutMs  = 60000
udpTimeoutMs   = 5000

# Log level: 0=silent, 1=error, 2=info, 3=debug
logLevel = 2

# ────────────────────────────────────────────────────────────────────────
# Upstream NHP-Server clusters
# ────────────────────────────────────────────────────────────────────────
#
# Each [[cluster]] describes one logical nhp-server identity, addressed by
# the SHA-256 fingerprint of its public key. Browsers reach a cluster via
#   POST /relay/<clusterId>
# where <clusterId> is the 11-char fingerprint printed in the relay logs at
# startup (also available from GET /clusters).
#
# Phase 1 supports exactly one [[cluster.instance]] per cluster. The schema
# already accepts a list and a load-balancing scheme so that the future
# multi-instance support (phase 2) needs no config changes.

# Optional: when an HTTP client uses the legacy `POST /relay` path with no
# cluster ID, fall back to this cluster. If unset, single-cluster configs
# automatically use that one cluster as default; multi-cluster configs
# require the client to specify the ID.
defaultClusterId = ""

[[cluster]]
name            = "default"
publicKeyBase64 = ""
loadBalance     = "weighted-random"   # phase 1: ignored (only 1 instance)

  [[cluster.instance]]
  host   = "127.0.0.1"
  port   = 62206
  weight = 1
