
#user  root;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Multi-cluster local demo: one nginx, two https entrypoints distinguished
    # by PORT (the public demo uses distinct domains ac/ac2 instead). Both
    # server blocks proxy from this same container (docker IP 177.7.0.8), whose
    # source IP each AC opens on a successful knock — so once the agent knocks a
    # cluster, the matching entrypoint becomes reachable.
    #   :8443 -> cluster 1 -> nhp-ac    -> web-app
    #   :8444 -> cluster 2 -> nhp-ac-c2 -> web-app-c2
    server {
        listen       8443 ssl;
        server_name  localhost;

        ssl_certificate     /cert.pem;
        ssl_certificate_key /key.pem;

        location / {
            proxy_pass   http://nhp-ac;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen       8444 ssl;
        server_name  localhost;

        ssl_certificate     /cert.pem;
        ssl_certificate_key /key.pem;

        location / {
            proxy_pass   http://nhp-ac-c2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
