# NHP-Server cluster 2 agent peers (generated by CI)

[[Agents]]
# Native nhp-agent client. Same trusted-operator key pair as cluster 1
# (nhp_agent_private_key in opennhp/demo) so existing operators can knock
# either cluster.
PubKeyBase64 = "${NHP_AGENT_PUBLIC_KEY}"
ExpireTime = 1924991999

[[Agents]]
# PUBLIC DEMO js-agent (browser-side). Same public demo key pair served at
# https://${DOMAIN_AGENT}/config.json so the browser demo can knock cluster
# 2 after selecting it in the cluster picker. Scope is demo-only (see the
# basic plugin resource.toml for cluster 2).
PubKeyBase64 = "${NHP_JSAGENT_PUBLIC_KEY}"
ExpireTime = 1924991999
