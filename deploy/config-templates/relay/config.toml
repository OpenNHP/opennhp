# NHP Relay config (generated by CI)

listenIp   = "0.0.0.0"
listenPort = 443

enableTLS   = true
tlsCertFile = "cert/cert.pem"
tlsKeyFile  = "cert/cert.key"

cipherScheme = 0

privateKeyBase64 = "${NHP_RELAY_PRIVATE_KEY}"

nhpServerHost = "${SERVER_PRIVATE_IP}"
nhpServerPort = 62206
nhpServerPublicKeyBase64 = "${NHP_SERVER_PUBLIC_KEY}"

keepaliveIntervalS = 20

readTimeoutMs  = 10000
writeTimeoutMs = 10000
idleTimeoutMs  = 60000
udpTimeoutMs   = 5000

logLevel = 2
