# NHP-Server base config (generated by CI)

PrivateKeyBase64 = "${NHP_SERVER_PRIVATE_KEY}"
DefaultCipherScheme = 0
ListenIp = ""
ListenPort = 62206
Hostname = "auth-plugin.${DOMAIN}"
LogLevel = 3
DisableAgentValidation = false
# AllowPrivateRelaySource intentionally absent — defaults to false. The
# production relay only sees public clients; accepting RFC1918 source
# addresses here would let a compromised relay inject fabricated
# entries into the connection map and AC ipset whitelist. Only flip
# this on for trusted local-only demos (see docker/nhp-server/etc/config.toml).
#
# ForceOverload also intentionally absent — defaults to false. It is a
# local debug toggle that pins Overload on so a developer can exercise
# the cookie handshake without generating ~16k concurrent connections.
# Production must rely on the natural connection-count trigger.
