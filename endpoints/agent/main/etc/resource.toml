# Resources the agent should knock on automatically after launch.
#
# Each [[Resources]] entry binds a (AuthServiceId, ResourceId) pair to
# one nhp-server cluster. Cluster references work by name:
#
#   Cluster = "<server.toml [[Servers]] Name>"
#
# Cluster names are stable across pubkey rotation — rotating an
# nhp-server's keypair only touches server.toml, not resource.toml.

[[Resources]]
AuthServiceId = "example"
ResourceId    = "demo"
Cluster       = "default"
