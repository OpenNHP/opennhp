# NHP-AC server peers (generated by CI)
#
# Each [[Servers]] entry is one logical nhp-server identity (one pubkey).
# [[Servers.Instances]] lists every concrete address the AC should reach
# for that identity; the AC fans NHP_AOL out to all of them. Schema is
# shared with nhp-agent/nhp-db — see nhp/common/clusterconfig.
#
# The demo runs a single nhp-server instance — to scale this cluster
# horizontally, stand up additional nhp-server hosts sharing the same
# keypair and append more [[Servers.Instances]] entries here.

[[Servers]]
PubKeyBase64 = "${NHP_SERVER_PUBLIC_KEY}"
ExpireTime   = 1924991999

  [[Servers.Instances]]
  Ip   = "${SERVER_PRIVATE_IP}"
  Port = 62206
