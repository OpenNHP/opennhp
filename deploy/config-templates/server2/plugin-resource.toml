# cluster 2 "basic" plugin resource.toml (generated by CI)
#
# Overrides the basic plugin's shipped etc/resource.toml on the cluster 2
# server so the "demo" resource is guarded by the cluster 2 AC (demo-ac2)
# instead of cluster 1's demo-ac. The plugin binary itself is identical to
# cluster 1; only this mapping differs. See deploy-demo-v2.yml.
#
# ${AC2_PRIVATE_IP} is substituted at deploy time by the workflow.
["demo"]
SkipAuth = true
OpenTime = 15
RedirectUrl = "https://ac2.${DOMAIN}"
RedirectWithParams = false
CookieDomain = "${DOMAIN}"

["demo".Resources."demoServer"]
ACId = "demo-ac2"
Hostname = "ac2.${DOMAIN}"
Addr.Ip = "${AC2_PRIVATE_IP}"
Addr.Port = 443
Addr.Protocol = ""
PortSuffix = false

["demo".ExInfo]
Title = "OpenNHP Auth Plugin Demo (cluster 2) - Authentication"
