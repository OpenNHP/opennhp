# NHP-Server agent peers (generated by CI)

[[Agents]]
# Native nhp-agent client (binary in endpoints/agent/). The matching
# private key (nhp_agent_private_key in opennhp/demo) is intended to be
# distributed only to trusted operators running the desktop/CLI agent —
# it is NOT served publicly. Users that hold this key authenticate as
# a "trusted operator" peer.
PubKeyBase64 = "${NHP_AGENT_PUBLIC_KEY}"
ExpireTime = 1924991999

[[Agents]]
# PUBLIC DEMO js-agent (browser-side, OpenNHP/js-agent). The matching
# private key is served as part of https://${DOMAIN_AGENT}/config.json
# so any browser can use it. Scope this peer's access to demo-only
# resources in resource.toml — anyone with this pubkey can authenticate
# as "demo browser agent".
PubKeyBase64 = "${NHP_JSAGENT_PUBLIC_KEY}"
ExpireTime = 1924991999
