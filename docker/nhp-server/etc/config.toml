# NHP-Server base config
# field with (-) does not support dynamic update

# PrivateKeyBase64 (-): server private key in base64 format.
# DefaultCipherScheme: 0: curve25519, 1: gmsm.
# MIGRATION: Values changed in v2.x. If upgrading: old 0(gmsm)->new 1, old 1(curve)->new 0.
# ListenIp (-): udp listening address.
# ListenPort (-): udp listening port.
# Hostname (-): server domain name.
# LogLevel: 0: silent, 1: error, 2: info, 3: audit, 4: debug, 5: trace.
# DisableAgentValidation: whether for the server to skip the agent's public key validation.
PrivateKeyBase64 = "I9UzYO3skKYmDykz9DRBbV+cEebSw/L5yIvzHI4jz+o="
DefaultCipherScheme = 1
ListenIp = "0.0.0.0"    # empty for ipv4 + ipv6, "0.0.0.0" for ipv4 only
ListenPort = 62206
Hostname = "localhost:62206" # the hostname of NHP-Server
LogLevel = 5
DisableAgentValidation = false

# ─── Demo-only ───────────────────────────────────────────────────────────
# Accept RFC1918 / loopback / CGNAT addresses as the SourceAddr field of
# an inner KNK forwarded via nhp-relay (NHP_RLY → HandleRelayForward).
#
# Why this is needed for the docker compose demo: when a host browser
# hits the relay through Docker Desktop's published port mapping, the
# relay container sees the request as coming from Docker's vpnkit
# gateway (e.g. 192.168.65.1 on macOS, 172.x.x.x on Linux), and that
# private address is what gets written into RelayForwardMsg.SourceAddr.
# The server's default anti-DoS check rejects RFC1918 SourceAddr
# values because, in production, a public-facing relay should never
# see one — it would mean the relay was injecting fabricated clients.
#
# DO NOT enable this on a production-facing nhp-server. With this
# flag on, a compromised relay can fill the server's connection map
# (and the downstream AC ipset whitelist) with any private-range
# SourceAddr it likes. Keep the default (false) everywhere except in
# trusted local-only demos like this one.
AllowPrivateRelaySource = true

